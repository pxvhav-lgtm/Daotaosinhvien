<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta
    name="description"
    content="Hệ thống đào tạo sinh viên thực tập tại Nhà máy thủy điện A Vương"
  >

  <title>
    Đào tạo sinh viên thực tập | Nhà máy thủy điện A Vương
  </title>

  <link
    rel="icon"
    type="image/png"
    href="./Logo.png"
  >

  <link
    rel="stylesheet"
    href="./style.css"
  >

  <link
    rel="stylesheet"
    href="./video-gate.css"
  >

  <link
    rel="stylesheet"
    href="./dashboard-v2.css"
  >

  <link
    rel="stylesheet"
    href="./admin.css"
  >
</head>

<body>
  <div id="app">
    <main class="loading-page">
      <div class="loading-box">
        <div class="spinner"></div>

        <p>Đang tải hệ thống...</p>
      </div>
    </main>
  </div>

  <!-- Thư viện Supabase tải trước -->
  <script
    src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"
  ></script>

  <!-- Mã nền tảng -->
  <script src="./app.js"></script>

  <!-- Chức năng học video -->
  <script src="./video-gate.js"></script>

  <!-- Dashboard sinh viên -->
  <script src="./dashboard-v2.js"></script>

  <!-- Dashboard quản trị phải tải cuối -->
  <script src="./admin.js"></script>

  <!-- Chỉ khởi động sau khi tất cả file đã tải -->
  <script>
    window.addEventListener('DOMContentLoaded', async () => {
      try {
        await init();
      } catch (error) {
        console.error('Lỗi khởi động hệ thống:', error);

        const appElement = document.querySelector('#app');

        if (appElement) {
          appElement.innerHTML = `
            <main class="message-page">
              <section class="message-card">
                <h1>Không thể khởi động hệ thống</h1>

                <p>
                  Đã xảy ra lỗi khi tải dữ liệu.
                  Vui lòng mở bảng Console để kiểm tra chi tiết.
                </p>

                <button
                  class="primary-button"
                  type="button"
                  onclick="window.location.reload()"
                >
                  Tải lại trang
                </button>
              </section>
            </main>
          `;
        }
      }
    });
  </script>
</body>
</html>
