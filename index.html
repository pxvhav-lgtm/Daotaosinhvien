  ====================================================== -->

  <!-- CSS học video và tài liệu -->
  <link
    rel="stylesheet"
    href="./video-gate.css?v=20260720-112"
  >

  <!-- CSS Dashboard sinh viên -->
  <link
    rel="stylesheet"
    href="./dashboard-v2.css?v=20260720-112"
  >

  <!-- CSS Dashboard quản trị -->
  <link
    rel="stylesheet"
    href="./admin.css?v=20260720-112"
  >

  <!-- CSS danh sách kết quả kiểm tra trong Admin -->
  <link
    rel="stylesheet"
    href="./admin-results.css?v=20260720-112"
  >

  <!--
    CSS hiệu chỉnh bản in:
    - Logo lớn hơn
    - Tên công ty không xuống nhiều dòng
    - Phiếu nằm gọn trên một trang A4
  -->
  <link
    rel="stylesheet"
    href="./admin-print-fix.css?v=20260720-115"
  >

  <!-- CSS nhập JSON từ NotebookLM -->
  <link
    rel="stylesheet"
    href="./nblm-import.css?v=20260720-112"
  >

  <!-- CSS bài kiểm tra tổng kết Bài 23 -->
  <link

    href="./final-quiz.css?v=20260720-112"
  >

  <!-- CSS Chatbox AI -->
  <link

    href="./lesson-chat.css?v=20260720-112"
  >

  <!--
    File đồng bộ font toàn hệ thống.
    Phải tải cuối cùng trong nhóm CSS chung.
  -->
  <link

    href="./font-system.css?v=20260720-112"
  >
</head>

<body>
  <div id="app">
    <main class="loading-page">
      <div class="loading-box">
        <div class="spinner"></div>

        <p>
          Đang tải hệ thống...
        </p>
      </div>
    </main>
  </div>

  <!-- =====================================================
       THƯ VIỆN SUPABASE
       Phải tải trước app.js
  ====================================================== -->

  <script
    src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"
  ></script>

  <!-- =====================================================
       JAVASCRIPT NỀN TẢNG
  ====================================================== -->

  <script
    src="./app.js?v=20260720-112"
  ></script>

  <!-- Chức năng xem video Google Drive -->
  <script
    src="./video-gate.js?v=20260720-112"
  ></script>

  <!-- Dashboard sinh viên -->
  <script
    src="./dashboard-v2.js?v=20260720-112"
  ></script>

  <!-- Dashboard quản trị -->
  <script
    src="./admin.js?v=20260720-112"
  ></script>

  <!--
    Quản lý danh sách kết quả kiểm tra.
    Phải tải sau admin.js.
  -->
  <script
    src="./admin-results.js?v=20260720-112"
  ></script>

  <!--
    Hiệu chỉnh tên file PDF gợi ý.
    Phải tải sau admin-results.js.
  -->
  <script
    src="./admin-print-fix.js?v=20260720-115"
  ></script>

  <!--
    Nhập JSON từ NotebookLM.
    Phải tải sau admin.js.
  -->
  <script
    src="./nblm-import.js?v=20260720-112"
  ></script>

  <!--
    Bài kiểm tra tổng kết Bài 23.
    Phải tải sau các file nền tảng.
  -->
  <script
    src="./final-quiz.js?v=20260720-112"
  ></script>

  <!--
    Chatbox hỏi đáp tài liệu.
    Tải sau cùng trong nhóm chức năng.
  -->
  <script
    src="./lesson-chat.js?v=20260720-112"
  ></script>

  <!-- =====================================================
       KHỞI ĐỘNG HỆ THỐNG
  ====================================================== -->

  <script>
    window.addEventListener(
      'DOMContentLoaded',
      async () => {
        try {
          if (
            typeof init !==
            'function'
          ) {
            throw new Error(
              'Không tìm thấy hàm init(). Vui lòng kiểm tra file app.js.'
            );
          }

          await init();
        } catch (error) {
          console.error(
            'Lỗi khởi động hệ thống:',
            error
          );

          const appElement =
            document.querySelector(
              '#app'
            );

          if (!appElement) {
            return;
          }

          appElement.innerHTML = `
            <main class="message-page">
              <section class="message-card">
                <img
                  class="company-logo message-logo"
                  src="./Logo.png"
                  alt="Logo Công ty Cổ phần Thủy điện A Vương"
                >

                <h1>
                  Không thể khởi động hệ thống
                </h1>

                <p>
                  Đã xảy ra lỗi khi tải dữ liệu.
                  Vui lòng mở bảng Console để kiểm tra chi tiết.
                </p>

                <button
                  class="primary-button"
                  type="button"
                  onclick="window.location.reload()"
                >
                  Tải lại trang
                </button>
              </section>
            </main>
          `;
        }
      }
    );
  </script>
</body>
</html>
