<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta
    name="description"
    content="Hệ thống đào tạo sinh viên thực tập tại Nhà máy thủy điện A Vương"
  >

  <meta
    name="theme-color"
    content="#075f82"
  >

  <title>
    Đào tạo sinh viên thực tập | Nhà máy thủy điện A Vương
  </title>

  <link
    rel="icon"
    type="image/png"
    href="./Logo.png"
  >

  <!-- Font Inter dùng chung -->
  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  >

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  >

  <!-- CSS nền tảng -->
  <link
    rel="stylesheet"
    href="./style.css?v=20260720-100"
  >

  <!-- CSS học video và tài liệu -->
  <link
    rel="stylesheet"
    href="./video-gate.css?v=20260720-100"
  >

  <!-- CSS Dashboard sinh viên -->
  <link
    rel="stylesheet"
    href="./dashboard-v2.css?v=20260720-100"
  >

  <!-- CSS Dashboard quản trị -->
  <link
    rel="stylesheet"
    href="./admin.css?v=20260720-100"
  >

  <!-- CSS nhập JSON từ NotebookLM -->
  <link
    rel="stylesheet"
    href="./nblm-import.css?v=20260720-100"
  >

  <!-- CSS bài kiểm tra tổng kết -->
  <link
    rel="stylesheet"
    href="./final-quiz.css?v=20260720-100"
  >

  <!-- CSS Chatbox AI -->
  <link
    rel="stylesheet"
    href="./lesson-chat.css?v=20260720-100"
  >

  <!--
    Luôn tải cuối cùng.
    File này đồng bộ font trên toàn bộ website.
  -->
  <link
    rel="stylesheet"
    href="./font-system.css?v=20260720-100"
  >
</head>

<body>
  <div id="app">
    <main class="loading-page">
      <div class="loading-box">
        <div class="spinner"></div>

        <p>
          Đang tải hệ thống...
        </p>
      </div>
    </main>
  </div>

  <!-- Supabase phải tải trước app.js -->
  <script
    src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"
  ></script>

  <script
    src="./app.js?v=20260720-100"
  ></script>

  <script
    src="./video-gate.js?v=20260720-100"
  ></script>

  <script
    src="./dashboard-v2.js?v=20260720-100"
  ></script>

  <script
    src="./admin.js?v=20260720-100"
  ></script>

  <script
    src="./nblm-import.js?v=20260720-100"
  ></script>

  <script
    src="./final-quiz.js?v=20260720-100"
  ></script>

  <!-- Chatbox tải cuối -->
  <script
    src="./lesson-chat.js?v=20260720-100"
  ></script>

  <script>
    window.addEventListener(
      'DOMContentLoaded',
      async () => {
        try {
          if (
            typeof init !==
            'function'
          ) {
            throw new Error(
              'Không tìm thấy hàm init(). Vui lòng kiểm tra app.js.'
            );
          }

          await init();
        } catch (error) {
          console.error(
            'Lỗi khởi động hệ thống:',
            error
          );

          const appElement =
            document.querySelector(
              '#app'
            );

          if (!appElement) {
            return;
          }

          appElement.innerHTML = `
            <main class="message-page">
              <section class="message-card">
                <img
                  class="company-logo message-logo"
                  src="./Logo.png"
                  alt="Logo Công ty Cổ phần Thủy điện A Vương"
                >

                <h1>
                  Không thể khởi động hệ thống
                </h1>

                <p>
                  Đã xảy ra lỗi khi tải dữ liệu.
                  Vui lòng mở bảng Console để kiểm tra chi tiết.
                </p>

                <button
                  class="primary-button"
                  type="button"
                  onclick="window.location.reload()"
                >
                  Tải lại trang
                </button>
              </section>
            </main>
          `;
        }
      }
    );
  </script>
</body>
</html>
